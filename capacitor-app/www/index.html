<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocAgent</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1A1A2E">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8F7F3; }
        .app-splash {
            position: fixed; inset: 0; background: #F8F7F3;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 9999; transition: opacity 0.4s ease;
        }
        .app-splash.hiding { opacity: 0; pointer-events: none; }
        .splash-logo {
            width: 80px; height: 80px; border-radius: 20px; background: #1A1A2E;
            color: white; display: flex; align-items: center; justify-content: center;
            font-size: 40px; font-weight: 700; font-family: Georgia, serif;
            margin-bottom: 20px; animation: splashPulse 1.5s ease-in-out infinite;
        }
        @keyframes splashPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .splash-text { font-size: 18px; color: #1A1A2E; font-weight: 600; margin-bottom: 8px; }
        .splash-sub { font-size: 13px; color: #656565; }
        .splash-error {
            margin-top: 20px; padding: 12px 20px; background: #FEF2F2;
            border: 1px solid #FECACA; border-radius: 8px; color: #DC2626;
            font-size: 13px; max-width: 300px; text-align: center; display: none;
        }
        .splash-config {
            margin-top: 16px; display: flex; flex-direction: column; gap: 12px; align-items: center; width: 100%; max-width: 320px;
        }
        .splash-config input {
            padding: 12px 16px; border: 1px solid #E0DFD6; border-radius: 12px;
            font-size: 14px; width: 100%; outline: none; background: white;
        }
        .splash-config input:focus { border-color: #1A1A2E; box-shadow: 0 0 0 2px rgba(26,26,46,0.1); }
        .splash-config button {
            padding: 12px 32px; background: #1A1A2E; color: white; border: none;
            border-radius: 12px; font-size: 15px; cursor: pointer; width: 100%;
            font-weight: 500;
        }
        .splash-config button:active { background: #2A2A4E; }
        .splash-hint {
            margin-top: 12px; font-size: 12px; color: #999; text-align: center; line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="app-splash" id="appSplash">
        <div class="splash-logo">D</div>
        <div class="splash-text">DocAgent</div>
        <div class="splash-sub" id="splashSub">连接服务器中...</div>
        <div class="splash-error" id="splashError"></div>
        <div class="splash-config" id="splashConfig" style="display:none;">
            <input type="text" id="serverUrl" placeholder="http://你的公网IP:8000" value="">
            <button onclick="connectServer()">连接服务器</button>
        </div>
        <div class="splash-hint" id="splashHint" style="display:none;">
            请输入服务器公网IP地址<br>格式：http://公网IP:8000<br>例如：http://123.45.67.89:8000
        </div>
    </div>
    <script>
        // 首次启动需用户输入公网地址，无需局域网
        function getServerUrl() { return localStorage.getItem('docagent_server') || ''; }
        function connectServer() {
            var url = document.getElementById('serverUrl').value.trim();
            if (!url) { alert('请输入服务器地址'); return; }
            if (!url.startsWith('http')) url = 'http://' + url;
            localStorage.setItem('docagent_server', url);
            loadApp(url);
        }
        function loadApp(serverUrl) {
            var splash = document.getElementById('appSplash');
            var errorEl = document.getElementById('splashError');
            var subEl = document.getElementById('splashSub');
            subEl.textContent = '正在连接 ' + serverUrl + ' ...';
            errorEl.style.display = 'none';
            fetch(serverUrl + '/api/v1/models', { method: 'GET', signal: AbortSignal.timeout ? AbortSignal.timeout(8000) : undefined })
                .then(function(resp) { if (!resp.ok) throw new Error('Server returned ' + resp.status); return resp.json(); })
                .then(function(data) {
                    var iframe = document.createElement('iframe');
                    iframe.style.cssText = 'position:fixed;inset:0;width:100%;height:100%;border:none;z-index:1;';
                    iframe.src = serverUrl;
                    iframe.onload = function() {
                        splash.classList.add('hiding');
                        setTimeout(function() { splash.style.display = 'none'; }, 500);
                    };
                    document.body.appendChild(iframe);
                })
                .catch(function(err) { showConfig('无法连接到服务器: ' + err.message); });
        }
        function showConfig(msg) {
            document.getElementById('splashError').textContent = msg;
            document.getElementById('splashError').style.display = 'block';
            document.getElementById('splashConfig').style.display = 'flex';
            document.getElementById('splashHint').style.display = 'block';
            document.getElementById('splashSub').textContent = '请配置服务器地址';
            document.getElementById('serverUrl').value = getServerUrl();
        }
        // 启动时检查是否有已保存的地址
        var savedUrl = getServerUrl();
        if (savedUrl) {
            // 有保存的地址，自动连接
            document.getElementById('serverUrl').value = savedUrl;
            fetch(savedUrl + '/api/v1/models', { method: 'GET' })
                .then(function(resp) { if (resp.ok) loadApp(savedUrl); else showConfig('服务器返回错误'); })
                .catch(function() { showConfig('自动连接失败，请检查服务器地址'); });
        } else {
            // 首次启动，显示配置界面
            showConfig('欢迎使用 DocAgent，请输入服务器地址');
        }
    </script>
</body>
</html>
