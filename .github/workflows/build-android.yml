name: Build Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android-app/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x android-app/gradlew

      - name: Build Debug APK
        working-directory: android-app
        run: |
          # 创建 local.properties 指向 Android SDK
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          # 构建
          ./gradlew assembleDebug

      - name: Build Release APK (unsigned)
        working-directory: android-app
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: DocAgent-debug
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: DocAgent-release
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Create Release with APK
        if: github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: DocAgent v1.0.${{ github.run_number }}
          files: |
            android-app/app/build/outputs/apk/debug/app-debug.apk
            android-app/app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
