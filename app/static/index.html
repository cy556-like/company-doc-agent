<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocAgent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f7f7f8;
            --bg-sidebar: #f9f9f9;
            --bg-chat: #ffffff;
            --bg-input: #ffffff;
            --text-primary: #1a1a1a;
            --text-secondary: #6b6b6b;
            --accent: #10a37f;
            --accent-hover: #0d8c6d;
            --user-bubble: #f7f7f8;
            --ai-bubble: #ffffff;
            --border: #e5e5e5;
            --border-sidebar: #e5e5e5;
            --success: #10a37f;
            --error: #ef4444;
            --warning: #f59e0b;
            --sidebar-width: 260px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
        }

        /* ===== Login Page ===== */
        .login-page {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: #f7f7f8;
        }
        .login-card {
            background: #ffffff;
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .login-card h1 { text-align: center; margin-bottom: 4px; font-size: 28px; color: var(--accent); font-weight: 700; letter-spacing: -0.5px; }
        .login-card .subtitle { text-align: center; color: var(--text-secondary); margin-bottom: 30px; font-size: 13px; letter-spacing: 0.3px; }
        .login-card .tab-bar { display: flex; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
        .login-card .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: all 0.2s; font-size: 14px; font-weight: 500; }
        .login-card .tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
        .login-card .tab:hover:not(.active) { color: var(--text-primary); }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-secondary); font-weight: 500; }
        .form-group input { width: 100%; padding: 11px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; outline: none; transition: border 0.2s, box-shadow 0.2s; }
        .form-group input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(16,163,127,0.12); }
        .form-group input::placeholder { color: #b0b0b0; }
        .btn { width: 100%; padding: 11px; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: var(--text-primary); color: white; }
        .btn-primary:hover { background: #000000; }
        .btn-primary:active { transform: scale(0.98); }
        .msg-box { text-align: center; margin-top: 12px; font-size: 13px; min-height: 20px; }
        .msg-box.error { color: var(--error); }
        .msg-box.success { color: var(--success); }

        /* ===== Chat Page Layout ===== */
        .chat-page { display: none; height: 100vh; flex-direction: row; }

        /* ===== Sidebar ===== */
        .sidebar {
            width: var(--sidebar-width);
            min-width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-sidebar);
            display: flex;
            flex-direction: column;
            height: 100vh;
            transition: all 0.3s;
        }
        .sidebar.collapsed {
            width: 0;
            min-width: 0;
            overflow: hidden;
            border-right: none;
        }

        .sidebar-header {
            padding: 12px;
            border-bottom: 1px solid var(--border-sidebar);
        }
        .new-chat-btn {
            width: 100%;
            padding: 10px 14px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-weight: 500;
        }
        .new-chat-btn:hover {
            background: #ffffff;
            border-color: #d0d0d0;
        }
        .new-chat-btn .plus-icon {
            width: 22px; height: 22px;
            border-radius: 4px;
            background: var(--accent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: bold;
            flex-shrink: 0;
            line-height: 1;
        }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 6px;
        }
        .chat-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s;
            margin-bottom: 1px;
            gap: 8px;
            position: relative;
        }
        .chat-item:hover {
            background: #eeeeef;
        }
        .chat-item.active {
            background: #e8e8e9;
        }
        .chat-item .chat-icon {
            font-size: 14px;
            flex-shrink: 0;
            opacity: 0.5;
        }
        .chat-item .chat-title {
            flex: 1;
            font-size: 13px;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chat-item .chat-actions {
            display: none;
            gap: 2px;
            flex-shrink: 0;
        }
        .chat-item:hover .chat-actions {
            display: flex;
        }
        .chat-item:hover .chat-time {
            display: none;
        }
        .chat-action-btn {
            width: 26px; height: 26px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            transition: all 0.15s;
        }
        .chat-action-btn:hover {
            background: rgba(0,0,0,0.06);
            color: var(--text-primary);
        }
        .chat-action-btn.delete:hover {
            color: var(--error);
            background: rgba(239, 68, 68, 0.08);
        }
        .chat-item .chat-time {
            font-size: 11px;
            color: var(--text-secondary);
            opacity: 0.6;
            flex-shrink: 0;
        }

        .sidebar-footer {
            padding: 10px 12px;
            border-top: 1px solid var(--border-sidebar);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar-footer .user-avatar {
            width: 32px; height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            color: white;
            flex-shrink: 0;
            font-weight: 600;
        }
        .sidebar-footer .user-name {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 500;
        }
        .sidebar-footer .logout-btn {
            width: 32px; height: 32px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: all 0.15s;
        }
        .sidebar-footer .logout-btn:hover {
            background: rgba(239, 68, 68, 0.08);
            color: var(--error);
        }

        /* ===== Chat Main Area ===== */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
            background: var(--bg-chat);
        }

        .chat-header {
            display: flex;
            align-items: center;
            padding: 10px 20px;
            background: var(--bg-chat);
            border-bottom: 1px solid var(--border);
            gap: 12px;
            min-height: 52px;
        }
        .toggle-sidebar-btn {
            width: 34px; height: 34px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.15s;
            flex-shrink: 0;
        }
        .toggle-sidebar-btn:hover { border-color: #ccc; color: var(--text-primary); background: var(--bg-secondary); }
        .chat-header h1 { font-size: 16px; color: var(--text-primary); flex: 1; font-weight: 600; }
        .chat-header .header-actions { display: flex; align-items: center; gap: 8px; }
        .header-btn { padding: 6px 14px; background: transparent; border: 1px solid var(--border); border-radius: 6px; color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: all 0.15s; font-weight: 500; white-space: nowrap; }
        .header-btn:hover { border-color: #ccc; color: var(--text-primary); background: var(--bg-secondary); }
        .header-btn.danger:hover { border-color: var(--error); color: var(--error); background: rgba(239,68,68,0.04); }
        .model-select { padding: 6px 10px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-size: 12px; cursor: pointer; outline: none; transition: border 0.2s; }
        .model-select:hover, .model-select:focus { border-color: var(--text-primary); }
        .model-select option { background: #ffffff; color: var(--text-primary); }

        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; background: var(--bg-chat); }

        .message { display: flex; margin-bottom: 24px; max-width: 800px; margin-left: auto; margin-right: auto; }
        .message.user { flex-direction: row-reverse; }
        .message .avatar { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
        .message.user .avatar { background: var(--accent); margin-left: 12px; color: white; font-size: 12px; font-weight: 600; }
        .message.assistant .avatar { background: #e8e8e9; margin-right: 12px; }
        .message .bubble { padding: 12px 16px; border-radius: 12px; font-size: 15px; line-height: 1.7; max-width: 70%; white-space: pre-wrap; word-break: break-word; }
        .message.user .bubble { background: var(--user-bubble); border-bottom-right-radius: 4px; color: var(--text-primary); }
        .message.assistant .bubble { background: var(--ai-bubble); border-bottom-left-radius: 4px; border: 1px solid var(--border); color: var(--text-primary); }
        .message .bubble a { color: var(--accent); text-decoration: underline; }

        .typing-indicator { display: none; max-width: 800px; margin: 0 auto 20px auto; }
        .typing-indicator .dots { display: flex; gap: 4px; padding: 14px 16px; background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 12px; width: fit-content; }
        .typing-indicator .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-secondary); animation: bounce 1.4s infinite ease-in-out; }
        .typing-indicator .dot:nth-child(1) { animation-delay: 0s; }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        .chat-input-area { padding: 16px 24px 20px; background: var(--bg-chat); }
        .input-container { max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 8px; }
        .file-bar { display: none; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; font-size: 13px; }
        .file-bar .file-name { flex: 1; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-bar .remove-file { cursor: pointer; color: var(--text-secondary); font-size: 16px; transition: color 0.15s; }
        .file-bar .remove-file:hover { color: var(--error); }
        .input-row { display: flex; gap: 8px; align-items: flex-end; }
        .input-row textarea { flex: 1; padding: 11px 16px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 12px; color: var(--text-primary); font-size: 15px; outline: none; resize: none; min-height: 48px; max-height: 120px; font-family: inherit; line-height: 1.5; transition: border 0.2s, box-shadow 0.2s; }
        .input-row textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(16,163,127,0.1); }
        .input-row textarea::placeholder { color: #b0b0b0; }
        .icon-btn { width: 44px; height: 44px; border-radius: 10px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.2s; }
        .icon-btn.attach { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
        .icon-btn.attach:hover { border-color: #ccc; color: var(--text-primary); background: var(--bg-secondary); }
        .icon-btn.send { background: var(--accent); color: white; }
        .icon-btn.send:hover { background: var(--accent-hover); }
        .icon-btn.send:disabled { opacity: 0.4; cursor: not-allowed; }

        .download-link { display: inline-block; margin-top: 8px; padding: 6px 16px; background: var(--accent); color: white; border-radius: 6px; text-decoration: none; font-size: 13px; transition: background 0.2s; }
        .download-link:hover { background: var(--accent-hover); }

        .welcome-msg { text-align: center; padding: 80px 24px 40px; max-width: 600px; margin: 0 auto; }
        .welcome-msg h2 { font-size: 26px; margin-bottom: 12px; color: var(--text-primary); font-weight: 700; }
        .welcome-msg p { color: var(--text-secondary); font-size: 15px; line-height: 1.8; margin-bottom: 28px; }
        .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .quick-action { padding: 9px 16px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); cursor: pointer; font-size: 13px; transition: all 0.15s; font-weight: 500; }
        .quick-action:hover { border-color: var(--accent); color: var(--accent); background: rgba(16,163,127,0.04); }

        /* ===== Knowledge Base Modal ===== */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: #ffffff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 520px; max-height: 75vh; display: flex; flex-direction: column; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .modal h3 { margin-bottom: 16px; color: var(--text-primary); font-size: 17px; font-weight: 600; }
        .modal .upload-section { padding: 20px; background: var(--bg-secondary); border: 2px dashed var(--border); border-radius: 10px; margin-bottom: 16px; text-align: center; transition: all 0.2s; cursor: pointer; }
        .modal .upload-section:hover { border-color: var(--accent); background: rgba(16,163,127,0.03); }
        .modal .upload-section.dragover { border-color: var(--accent); background: rgba(16,163,127,0.06); }
        .modal .upload-section .upload-icon { font-size: 28px; margin-bottom: 8px; opacity: 0.6; }
        .modal .upload-section .upload-text { font-size: 14px; color: var(--text-secondary); }
        .modal .upload-section .upload-text strong { color: var(--accent); font-weight: 600; }
        .modal .upload-section .upload-hint { font-size: 12px; color: var(--text-secondary); margin-top: 6px; opacity: 0.7; }
        .modal .upload-progress { display: none; margin-bottom: 16px; padding: 12px 16px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border); }
        .modal .upload-progress .progress-file { font-size: 14px; margin-bottom: 8px; color: var(--text-primary); }
        .modal .upload-progress .progress-bar-bg { width: 100%; height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .modal .upload-progress .progress-bar-fill { height: 100%; background: var(--text-primary); border-radius: 3px; transition: width 0.3s; width: 0%; }
        .modal .upload-progress .progress-status { font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
        .modal .upload-progress .progress-status.success { color: var(--success); }
        .modal .upload-progress .progress-status.error { color: var(--error); }
        .modal .divider { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; color: var(--text-secondary); font-size: 13px; }
        .modal .divider::before, .modal .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
        .modal .doc-list { max-height: 250px; overflow-y: auto; }
        .modal .doc-item { padding: 10px 12px; border-bottom: 1px solid var(--border); font-size: 14px; display: flex; align-items: center; gap: 8px; transition: background 0.15s; }
        .modal .doc-item:hover { background: var(--bg-secondary); }
        .modal .doc-item .doc-icon { font-size: 16px; }
        .modal .doc-item .doc-name { flex: 1; color: var(--text-primary); }
        .modal .doc-item .doc-delete-btn {
            padding: 4px 12px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            opacity: 0;
        }
        .modal .doc-item:hover .doc-delete-btn {
            opacity: 1;
        }
        .modal .doc-item .doc-delete-btn:hover {
            color: var(--error);
            background: rgba(239,68,68,0.06);
        }
        .modal .doc-empty { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 14px; }
        .modal .close-btn { margin-top: 16px; width: 100%; background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); font-weight: 500; }
        .modal .close-btn:hover { background: #e8e8e9; }

        #kbFileInput { display: none; }
        #fileInput { display: none; }

        /* ===== Rename Overlay ===== */
        .rename-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; }
        .rename-overlay.show { display: flex; }
        .rename-card { background: #ffffff; border: 1px solid var(--border); border-radius: 12px; padding: 24px; width: 360px; box-shadow: 0 8px 30px rgba(0,0,0,0.12); }
        .rename-card h3 { margin-bottom: 16px; color: var(--text-primary); font-size: 16px; font-weight: 600; }
        .rename-card input { width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; outline: none; margin-bottom: 16px; transition: border 0.2s; }
        .rename-card input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(16,163,127,0.1); }
        .rename-card .rename-btns { display: flex; gap: 10px; }
        .rename-card .rename-btns button { flex: 1; padding: 10px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; transition: all 0.15s; font-weight: 500; }
        .rename-card .cancel-btn { background: var(--bg-secondary); color: var(--text-primary); border: 1px solid var(--border); }
        .rename-card .cancel-btn:hover { background: #e8e8e9; }
        .rename-card .confirm-btn { background: var(--text-primary); color: white; }
        .rename-card .confirm-btn:hover { background: #000000; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d0d0d0; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #b0b0b0; }

        /* ===== Sidebar Overlay (Mobile) ===== */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.3);
            z-index: 998;
        }
        .sidebar-overlay.active { display: block; }

        /* ===== Mobile Responsive ===== */
        @media (max-width: 768px) {
            .login-card {
                width: 95% !important;
                max-width: 400px !important;
                padding: 28px 20px !important;
            }
            .form-group input {
                font-size: 16px !important;
            }
            .sidebar {
                position: fixed !important;
                left: -280px !important;
                top: 0 !important;
                height: 100vh !important;
                z-index: 999 !important;
                transition: left 0.3s ease !important;
                box-shadow: none !important;
            }
            .sidebar.mobile-open {
                left: 0 !important;
                box-shadow: 4px 0 20px rgba(0,0,0,0.1) !important;
            }
            .sidebar.collapsed {
                left: -280px !important;
                width: var(--sidebar-width) !important;
                min-width: var(--sidebar-width) !important;
            }
            .chat-main {
                width: 100% !important;
            }
            .chat-header {
                padding: 10px 12px !important;
                gap: 8px !important;
            }
            .chat-header h1 {
                font-size: 15px !important;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .header-btn {
                padding: 6px 10px !important;
                font-size: 12px !important;
            }
            .chat-messages {
                padding: 12px 8px !important;
            }
            .message {
                margin-bottom: 14px !important;
            }
            .message .avatar {
                width: 28px !important;
                height: 28px !important;
                font-size: 12px !important;
            }
            .message.user .avatar {
                margin-left: 8px !important;
            }
            .message.assistant .avatar {
                margin-right: 8px !important;
            }
            .message .bubble {
                padding: 10px 14px !important;
                font-size: 15px !important;
                max-width: 85% !important;
                line-height: 1.5 !important;
            }
            .welcome-msg {
                padding: 40px 16px !important;
            }
            .welcome-msg h2 {
                font-size: 22px !important;
            }
            .welcome-msg p {
                font-size: 14px !important;
            }
            .quick-actions {
                gap: 6px !important;
            }
            .quick-action {
                padding: 8px 12px !important;
                font-size: 13px !important;
            }
            .chat-input-area {
                padding: 10px 10px !important;
            }
            .input-container {
                max-width: 100% !important;
            }
            .input-row textarea {
                font-size: 16px !important;
                min-height: 44px !important;
                padding: 10px 14px !important;
            }
            .icon-btn {
                width: 44px !important;
                height: 44px !important;
            }
            .modal {
                width: 94vw !important;

<body>

<!-- ===== Sidebar Overlay (Mobile) ===== -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebarMobile()"></div>

<!-- ===== Login Page ===== -->
<div class="login-page" id="loginPage">

        <h1>DocAgent</h1>
        <p class="subtitle">Enterprise Document Intelligence Platform</p>
        <div class="tab-bar">
            <div class="tab active" onclick="switchTab('login')">登录</div>

<!-- ===== Chat Page ===== -->
<div class="chat-page" id="chatPage">

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="new-chat-btn" onclick="createNewChat()">
                <span class="plus-icon">+</span>
                <span>新建对话</span>
            </button>
        </div>
        <div class="chat-list" id="chatList">
            <!-- dynamic render -->
        </div>
        <div class="sidebar-footer">
            <div class="user-avatar" id="sidebarAvatar">U</div>
            <div class="user-name" id="sidebarUsername">用户</div>
            <button class="logout-btn" onclick="doLogout()" title="退出登录">⏻</button>
        </div>
    </div>

    <!-- Chat Main -->
    <div class="chat-main">
        <div class="chat-header">
            <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="切换侧边栏">☰</button>
            <h1>DocAgent</h1>

<div class="modal-overlay" id="docsModal">
    <div class="modal">
        <h3>知识库管理</h3>

        <div class="rename-btns">

            <button class="confirm-btn" onclick="confirmRename()">确认</button>

</div>

<script>
let currentUser = null;
let selectedFile = null;
let isLoading = false;
let currentChatId = null;
let allChats = [];
let renamingChatId = null;

// ===== 模型管理 =====
async function loadModels() {
    try {
        const resp = await fetch('/api/v1/models');
        const data = await resp.json();
        const select = document.getElementById('modelSelect');
        select.innerHTML = '';
        data.models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            opt.textContent = m.name;
            opt.title = m.desc;
            if (m.id === data.current) opt.selected = true;
            select.appendChild(opt);
        });
    } catch (e) { console.error('加载模型列表失败', e); }
}

async function switchModel() {
    const modelId = document.getElementById('modelSelect').value;
    try {
        const resp = await fetch('/api/v1/models/set', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ model_id: modelId })
        });
        const data = await resp.json();
        if (data.success) {
            const select = document.getElementById('modelSelect');
            const name = select.options[select.selectedIndex].textContent;
            addMessageToUI('assistant', `✅ 已切换到模型: ${name}`);
        }
    } catch (e) { console.error('切换模型失败', e); }
}

// ===== 登录/注册 =====
function switchTab(tab) {
    document.querySelectorAll('.login-card .tab').forEach(t => t.classList.remove('active'));
    if (tab === 'login') {
        document.querySelectorAll('.login-card .tab')[0].classList.add('active');
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    } else {
        document.querySelectorAll('.login-card .tab')[1].classList.add('active');
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    }
}

async function doLogin() {
    const username = document.getElementById('loginUser').value.trim();
    const password = document.getElementById('loginPass').value.trim();
    const msgEl = document.getElementById('loginMsg');
    if (!username || !password) { msgEl.className = 'msg-box error'; msgEl.textContent = '请输入用户名和密码'; return; }
    try {
        const resp = await fetch('/api/v1/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await resp.json();
        if (data.success) {
            currentUser = username;
            msgEl.className = 'msg-box success'; msgEl.textContent = '登录成功！';
            setTimeout(() => {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('chatPage').style.display = 'flex';
                document.getElementById('sidebarUsername').textContent = username;
                document.getElementById('sidebarAvatar').textContent = username[0].toUpperCase();
                loadChatList();
                loadModels();
            }, 500);
        } else { msgEl.className = 'msg-box error'; msgEl.textContent = data.message || '登录失败'; }
    } catch (e) { msgEl.className = 'msg-box error'; msgEl.textContent = '网络错误'; }
}

async function doRegister() {
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value.trim();
    const msgEl = document.getElementById('regMsg');
    if (!username || !password) { msgEl.className = 'msg-box error'; msgEl.textContent = '请输入用户名和密码'; return; }
    try {
        const resp = await fetch('/api/v1/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ username, password }) });
        const data = await resp.json();
        msgEl.className = data.success ? 'msg-box success' : 'msg-box error';
        msgEl.textContent = data.message;
    } catch (e) { msgEl.className = 'msg-box error'; msgEl.textContent = '网络错误'; }
}

function doLogout() {
    currentUser = null; selectedFile = null; currentChatId = null; allChats = [];
    document.getElementById('chatPage').style.display = 'none';
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('loginUser').value = '';
    document.getElementById('loginPass').value = '';
}

// ===== 会话管理 =====

async function loadChatList() {
    if (!currentUser) return;
    try {
        const resp = await fetch(`/api/v1/chats?username=${encodeURIComponent(currentUser)}`);
        const data = await resp.json();
        if (data.success) {
            allChats = data.chats;
            renderChatList();
            // 如果没有会话，自动创建一个
            if (allChats.length === 0) {
                await createNewChat();
            } else if (!currentChatId) {
                // 默认选中第一个
                switchChat(allChats[0].chat_id);
            }
        }
    } catch (e) { console.error('加载会话列表失败', e); }
}

function renderChatList() {
    const list = document.getElementById('chatList');
    list.innerHTML = '';
    allChats.forEach(chat => {
        const item = document.createElement('div');
        item.className = `chat-item${chat.chat_id === currentChatId ? ' active' : ''}`;
        item.onclick = (e) => {
            // 避免点击操作按钮时切换
            if (e.target.closest('.chat-action-btn')) return;
            switchChat(chat.chat_id);
            closeSidebarOnMobile();
        };
        const timeStr = formatTime(chat.updated_at || chat.created_at);
        item.innerHTML = `
            <span class="chat-icon">💬</span>
            <span class="chat-title" title="${escapeHtml(chat.title)}">${escapeHtml(chat.title)}</span>
            <span class="chat-time">${timeStr}</span>
            <div class="chat-actions">
                <button class="chat-action-btn" onclick="openRename('${chat.chat_id}', '${escapeHtml(chat.title)}')" title="重命名">✏️</button>
                <button class="chat-action-btn delete" onclick="deleteChatItem('${chat.chat_id}')" title="删除">🗑️</button>
            </div>
        `;
        list.appendChild(item);
    });
}

async function createNewChat() {
    if (!currentUser) return;
    try {
        const resp = await fetch(`/api/v1/chats?username=${encodeURIComponent(currentUser)}&title=${encodeURIComponent('新对话')}`, { method: 'POST' });
        const data = await resp.json();
        if (data.success) {
            currentChatId = data.chat.chat_id;
            await loadChatList();
            clearChatUI();
            closeSidebarOnMobile();
        }
    } catch (e) { console.error('创建会话失败', e); }
}

async function switchChat(chatId) {
    if (chatId === currentChatId) return;
    currentChatId = chatId;
    renderChatList();
    // 加载该会话的历史消息
    await loadChatHistory(chatId);
}

async function loadChatHistory(chatId) {
    const container = document.getElementById('chatMessages');
    container.innerHTML = '';
    try {
        const resp = await fetch(`/api/v1/history/${chatId}`);
        const data = await resp.json();
        const messages = data.messages || [];
        if (messages.length === 0) {
            container.innerHTML = `<div class="welcome-msg" id="welcomeMsg">
                <h2>👋 你好！</h2>
                <p>我是企业文档智能助手，可以帮你查询公司制度、搜索文档内容、查询员工信息、修改文档等。<br>选择文档后输入修改要求，我还能帮你修改文档并返回文件。</p>
                <div class="quick-actions">
                    <div class="quick-action" onclick="sendQuick('公司年假制度是什么？')">年假制度</div>
                    <div class="quick-action" onclick="sendQuick('列出所有员工信息')">员工信息</div>
                    <div class="quick-action" onclick="sendQuick('知识库有哪些文档？')">知识库文档</div>
                    <div class="quick-action" onclick="sendQuick('报销流程是什么？')">报销流程</div>
                </div>
            </div>`;
        } else {
            messages.forEach(m => addMessageToUI(m.role, m.content));
            scrollToBottom();
        }
    } catch (e) { console.error('加载历史失败', e); }
}

async function deleteChatItem(chatId) {
    if (!confirm('确定删除这个对话？')) return;
    try {
        await fetch(`/api/v1/chats/${chatId}?username=${encodeURIComponent(currentUser)}`, { method: 'DELETE' });
        if (chatId === currentChatId) {
            currentChatId = null;
            clearChatUI();
        }
        await loadChatList();
    } catch (e) { console.error('删除会话失败', e); }
}

function openRename(chatId, currentTitle) {
    renamingChatId = chatId;
    document.getElementById('renameInput').value = currentTitle;
    document.getElementById('renameOverlay').classList.add('show');
    document.getElementById('renameInput').focus();
}

function closeRename() {
    document.getElementById('renameOverlay').classList.remove('show');
    renamingChatId = null;
}

async function confirmRename() {
    const newTitle = document.getElementById('renameInput').value.trim();
    if (!newTitle || !renamingChatId) return;
    try {
        await fetch(`/api/v1/chats/${renamingChatId}/rename`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username: currentUser, chat_id: renamingChatId, new_title: newTitle })
        });
        closeRename();
        await loadChatList();
    } catch (e) { console.error('重命名失败', e); }
}

function clearChatUI() {
    const container = document.getElementById('chatMessages');
    container.innerHTML = `<div class="welcome-msg" id="welcomeMsg">
        <h2>👋 你好！</h2>
        <p>我是企业文档智能助手，可以帮你查询公司制度、搜索文档内容、查询员工信息、修改文档等。<br>选择文档后输入修改要求，我还能帮你修改文档并返回文件。</p>
        <div class="quick-actions">
            <div class="quick-action" onclick="sendQuick('公司年假制度是什么？')">年假制度</div>
            <div class="quick-action" onclick="sendQuick('列出所有员工信息')">员工信息</div>
            <div class="quick-action" onclick="sendQuick('知识库有哪些文档？')">知识库文档</div>
            <div class="quick-action" onclick="sendQuick('报销流程是什么？')">报销流程</div>
        </div>
    </div>`;
}

async function clearCurrentChat() {
    if (!currentChatId) return;
    if (!confirm('确定清除当前对话的所有消息？')) return;
    try {
        await fetch(`/api/v1/history/${currentChatId}`, { method: 'DELETE' });
        clearChatUI();
    } catch (e) {}
}

// ===== 侧边栏 =====
function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebarOverlay');
    if (window.innerWidth <= 768) {
        // 移动端：使用 drawer 模式
        sidebar.classList.toggle('mobile-open');
        overlay.classList.toggle('active');
    } else {
        // 桌面端：折叠/展开
        sidebar.classList.toggle('collapsed');
    }
}
function closeSidebarMobile() {
    document.getElementById('sidebar').classList.remove('mobile-open');
    document.getElementById('sidebarOverlay').classList.remove('active');
}
// 移动端点击聊天项后自动关闭侧边栏
function closeSidebarOnMobile() {
    if (window.innerWidth <= 768) {
        setTimeout(closeSidebarMobile, 200);
    }
}

// ===== 发送消息（支持流式输出） =====

// 创建流式消息气泡（返回 bubble 元素供后续追加内容）
function createStreamingBubble() {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = 'message assistant';
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    div.appendChild(avatar);
    div.appendChild(bubble);
    container.appendChild(div);
    return bubble;
}

// SSE 流式读取并渲染
async function streamChat(url, options, bubble) {
    let fullText = '';
    let cursorEl = null;
    let thinkingEl = null;

    // 添加思考中指示器
    function addThinking() {
        if (thinkingEl) return;
        thinkingEl = document.createElement('div');
        thinkingEl.className = 'thinking-indicator';
        thinkingEl.innerHTML = '<div class="spinner"></div><span>正在思考...</span>';
        bubble.appendChild(thinkingEl);
        scrollToBottom();
    }

    // 移除思考指示器
    function removeThinking() {
        if (thinkingEl) {
            thinkingEl.remove();
            thinkingEl = null;
        }
    }

    // 添加工具标签
    function addToolTag(display, isDone) {
        removeThinking();
        const tag = document.createElement('span');
        tag.className = isDone ? 'tool-tag done' : 'tool-tag';
        tag.textContent = isDone ? `${display} 完成` : `${display}...`;
        bubble.appendChild(tag);
        bubble.appendChild(document.createTextNode(' '));
        scrollToBottom();
    }

    // 添加闪烁光标
    function addCursor() {
        if (cursorEl) return;
        removeThinking();
        cursorEl = document.createElement('span');
        cursorEl.className = 'stream-cursor';
        cursorEl.textContent = '▊';
        bubble.appendChild(cursorEl);
        scrollToBottom();
    }

    // 追加 token 文字
    function appendToken(text) {
        removeThinking();
        if (cursorEl) {
            cursorEl.before(document.createTextNode(text));
        } else {
            bubble.appendChild(document.createTextNode(text));
        }
        scrollToBottom();
    }

    // 完成流式输出
    function finalize() {
        if (cursorEl) cursorEl.remove();
        cursorEl = null;
    }

    try {
        const resp = await fetch(url, options);

        if (!resp.ok) {
            removeThinking();
            const errData = await resp.json().catch(() => ({}));
            bubble.innerHTML = escapeHtml(errData.detail || `请求失败 (${resp.status})`);
            return;
        }

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split('\n');
            buffer = lines.pop(); // 保留不完整的行

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6).trim();
                if (!jsonStr) continue;

                try {
                    const data = JSON.parse(jsonStr);

                    switch (data.type) {
                        case 'thinking':
                            addThinking();
                            break;

                        case 'tool':
                            addToolTag(data.display || data.name, false);
                            break;

                        case 'tool_done':
                            addToolTag(data.display || data.name, true);
                            break;

                        case 'token':
                            addCursor();
                            appendToken(data.content);
                            fullText += data.content;
                            break;

                        case 'done':
                            finalize();
                            break;

                        case 'error':
                            removeThinking();
                            finalize();
                            bubble.innerHTML += `<br><span style="color:var(--error)">${escapeHtml(data.content)}</span>`;
                            break;
                    }
                } catch (e) {
                    console.warn('SSE parse error:', e, jsonStr);
                }
            }
        }

        // 确保最终清理
        finalize();
        removeThinking();

        // 如果没有任何内容，显示一个提示
        if (!fullText && bubble.textContent.trim() === '') {
            bubble.innerHTML = '（未获取到回复）';
        }

    } catch (e) {
        removeThinking();
        finalize();
        bubble.innerHTML = `<span style="color:var(--error)">网络错误，请重试</span>`;
    }
}

async function sendMessage() {
    if (isLoading) return;
    if (!currentChatId) { alert('请先创建或选择一个对话'); return; }
    const input = document.getElementById('msgInput');
    const message = input.value.trim();
    if (!message && !selectedFile) return;
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('welcomeMsg')?.remove();

    if (selectedFile && message) {
        // ===== 文件 + 消息 → 流式 =====
        addMessageToUI('user', `📎 ${selectedFile.name}\n${message}`);
        input.value = ''; autoResize(input);
        const bubble = createStreamingBubble();
        const formData = new FormData();
        formData.append('file', selectedFile);
        formData.append('message', message);
        formData.append('session_id', currentChatId);
        await streamChat('/api/v1/chat-with-file/stream', { method: 'POST', body: formData }, bubble);
        removeFile();
        await loadChatList();
    } else if (selectedFile && !message) {
        // ===== 仅上传文档（非流式） =====
        addMessageToUI('user', `[上传文档] ${selectedFile.name}`);
        showTyping(true);
        const formData = new FormData();
        formData.append('file', selectedFile);
        try {
            const resp = await fetch('/api/v1/upload', { method: 'POST', body: formData });
            const data = await resp.json();
            showTyping(false);
            const msg = data.detail?.message || (typeof data.detail === 'string' ? data.detail : '上传成功');
            addMessageToUI('assistant', msg);
        } catch (e) { showTyping(false); addMessageToUI('assistant', '上传失败，请重试'); }
        removeFile();
    } else {
        // ===== 纯文字对话 → 流式 =====
        addMessageToUI('user', message);
        input.value = ''; autoResize(input);
        const bubble = createStreamingBubble();
        await streamChat('/api/v1/chat/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message, session_id: currentChatId })
        }, bubble);
        await loadChatList();
    }
    isLoading = false; document.getElementById('sendBtn').disabled = false; scrollToBottom();
}

function sendQuick(text) { document.getElementById('msgInput').value = text; sendMessage(); }

function addMessageToUI(role, content) {
    const container = document.getElementById('chatMessages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = content.replace(/\n/g, '<br>');
    div.appendChild(avatar); div.appendChild(bubble); container.appendChild(div); scrollToBottom();
}

function showTyping(show) { document.getElementById('typingIndicator').style.display = show ? 'block' : 'none'; if (show) scrollToBottom(); }
function scrollToBottom() { const el = document.getElementById('chatMessages'); setTimeout(() => el.scrollTop = el.scrollHeight, 50); }
function onFileSelected(event) { const file = event.target.files[0]; if (file) { selectedFile = file; document.getElementById('fileName').textContent = file.name; document.getElementById('fileBar').style.display = 'flex'; document.getElementById('msgInput').placeholder = '针对此文件输入问题，或修改要求...'; } }
function removeFile() { selectedFile = null; document.getElementById('fileInput').value = ''; document.getElementById('fileBar').style.display = 'none'; document.getElementById('msgInput').placeholder = '输入问题...'; }

// ===== 知识库弹窗 =====

async function showDocs() {
    document.getElementById('docsModal').classList.add('show');
    await loadDocList();
}
function closeDocs() {
    document.getElementById('docsModal').classList.remove('show');
    document.getElementById('uploadProgress').style.display = 'none';
}

async function loadDocList() {
    const list = document.getElementById('docList');
    list.innerHTML = '<div class="doc-empty">加载中...</div>';
    try {
        const resp = await fetch('/api/v1/documents');
        const data = await resp.json();
        list.innerHTML = '';
        if (data.documents && data.documents.length > 0) {
            data.documents.forEach(doc => {
                const item = document.createElement('div');
                item.className = 'doc-item';
                let icon = '📄';
                if (doc.endsWith('.pdf')) icon = '📕';
                else if (doc.endsWith('.docx')) icon = '📘';
                else if (doc.endsWith('.txt')) icon = '📝';
                item.innerHTML = `<span class="doc-icon">${icon}</span><span class="doc-name">${doc}</span><button class="doc-delete-btn" onclick="deleteDocument('${doc.replace(/'/g, "\\'")}', this)">删除</button>`;
                list.appendChild(item);
            });
        } else {
            list.innerHTML = '<div class="doc-empty">暂无文档，请上传</div>';
        }
    } catch (e) { list.innerHTML = '<div class="doc-empty">加载失败</div>'; }
}

async function onKbFileSelected(event) {
    const files = event.target.files;
    if (!files || files.length === 0) return;
    for (let i = 0; i < files.length; i++) {
        await uploadToKnowledgeBase(files[i]);
    }
    document.getElementById('kbFileInput').value = '';
    await loadDocList();
}


async function deleteDocument(filename, btnEl) {
    if (!confirm(`确定要删除文档 "${filename}" 吗？此操作不可恢复！`)) return;
    const docItem = btnEl.closest('.doc-item');
    btnEl.disabled = true;
    btnEl.textContent = '删除中...';
    try {
        const resp = await fetch(`/api/v1/documents/${encodeURIComponent(filename)}`, { method: 'DELETE' });
        const data = await resp.json();
        if (resp.ok && data.status === 'success') {
            // 移除该行，带动画效果
            docItem.style.transition = 'all 0.3s';
            docItem.style.opacity = '0';
            docItem.style.transform = 'translateX(20px)';
            setTimeout(() => {
                docItem.remove();
                // 检查是否还有文档
                const list = document.getElementById('docList');
                if (list.children.length === 0) {
                    list.innerHTML = '<div class="doc-empty">暂无文档，请上传</div>';
                }
            }, 300);
        } else {
            alert('删除失败：' + (data.detail || '未知错误'));
            btnEl.disabled = false;
            btnEl.textContent = '删除';
        }
    } catch (e) {
        alert('删除失败：网络错误');
        btnEl.disabled = false;
        btnEl.textContent = '删除';
    }
}

async function uploadToKnowledgeBase(file) {
    const progressEl = document.getElementById('uploadProgress');
    const fileNameEl = document.getElementById('progressFileName');
    const barFill = document.getElementById('progressBarFill');
    const statusEl = document.getElementById('progressStatus');
    progressEl.style.display = 'block';
    fileNameEl.textContent = `📎 ${file.name}`;
    barFill.style.width = '10%';
    statusEl.textContent = '上传中...';
    statusEl.className = 'progress-status';
    const formData = new FormData();
    formData.append('file', file);
    try {
        barFill.style.width = '30%';
        const resp = await fetch('/api/v1/upload', { method: 'POST', body: formData });
        barFill.style.width = '80%';
        const data = await resp.json();
        if (resp.ok) {
            barFill.style.width = '100%';
            statusEl.textContent = '✅ 上传成功！文档已索引到知识库';
            statusEl.className = 'progress-status success';
        } else {
            barFill.style.width = '100%';
            barFill.style.background = 'var(--error)';
            statusEl.textContent = '❌ 上传失败：' + (data.detail || '未知错误');
            statusEl.className = 'progress-status error';
        }
    } catch (e) {
        barFill.style.width = '100%';
        barFill.style.background = 'var(--error)';
        statusEl.textContent = '❌ 网络错误，请重试';
        statusEl.className = 'progress-status error';
    }
    setTimeout(() => { progressEl.style.display = 'none'; barFill.style.background = 'var(--accent)'; }, 3000);
}

// ===== 工具函数 =====

function formatTime(timestamp) {
    if (!timestamp) return '';
    const now = Date.now() / 1000;
    const diff = now - timestamp;
    if (diff < 60) return '刚刚';
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 604800) return Math.floor(diff / 86400) + '天前';
    const d = new Date(timestamp * 1000);
    return `${d.getMonth() + 1}/${d.getDate()}`;
}

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function handleKey(event) { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

// 拖拽上传
document.addEventListener('DOMContentLoaded', function() {
    const uploadZone = document.getElementById('uploadZone');
    uploadZone.addEventListener('dragover', function(e) { e.preventDefault(); e.stopPropagation(); uploadZone.classList.add('dragover'); });
    uploadZone.addEventListener('dragleave', function(e) { e.preventDefault(); e.stopPropagation(); uploadZone.classList.remove('dragover'); });
    uploadZone.addEventListener('drop', function(e) {
        e.preventDefault(); e.stopPropagation(); uploadZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            (async () => {
                for (let i = 0; i < files.length; i++) { await uploadToKnowledgeBase(files[i]); }
                await loadDocList();
            })();
        }
    });
});
</script>
