<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DocAgent</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0e27'/%3E%3Ctext x='50' y='68' font-family='Arial' font-size='55' font-weight='bold' fill='%2300e68a' text-anchor='middle'%3ED%3C/text%3E%3C/svg%3E">
    <!-- Markdown Rendering + Code Highlighting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github.min.css">
    <script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
    <!-- App Styles -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- ===== Login Page Styles (Deep Space Blue + Order Green) ===== -->
    <style id="loginPageStyles">
        :root {
            --ds-1: #0a0e27;
            --ds-2: #0d1333;
            --ds-3: #111a44;
            --og-1: #00e68a;
            --og-2: #00cc7a;
            --og-3: #00ff99;
        }

        /* ===== Login Page - Split Layout ===== */
        .login-page {
            display: flex !important;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #0a0e27 !important;
            position: relative;
        }

        /* ===== LEFT SIDE - Visual Showcase (60%) ===== */
        .login-visual {
            position: relative;
            width: 60%;
            height: 100%;
            background: linear-gradient(135deg, var(--ds-1) 0%, var(--ds-2) 50%, var(--ds-3) 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Geometric Grid Background */
        .login-visual::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 230, 138, 0.06) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 138, 0.06) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridPulse 8s ease-in-out infinite;
            z-index: 1;
        }

        .login-visual::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 230, 138, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 230, 138, 0.025) 1px, transparent 1px);
            background-size: 15px 15px;
            z-index: 1;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* Data Light Trails */
        .light-trails { position: absolute; inset: 0; z-index: 2; overflow: hidden; }
        .light-trail { position: absolute; height: 2px; border-radius: 2px; filter: blur(1px); }
        .light-trail::after {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--og-1);
            box-shadow: 0 0 12px 4px rgba(0, 230, 138, 0.6), 0 0 30px 8px rgba(0, 230, 138, 0.2);
        }

        .trail-1 { top: 18%; width: 45%; background: linear-gradient(90deg, transparent, var(--og-1)); animation: trailSweep1 7s ease-in-out infinite; opacity: 0.7; }
        .trail-2 { top: 38%; width: 55%; background: linear-gradient(90deg, transparent, var(--og-2)); animation: trailSweep2 9s ease-in-out infinite 1s; opacity: 0.5; }
        .trail-3 { top: 62%; width: 40%; background: linear-gradient(90deg, transparent, var(--og-3)); animation: trailSweep3 6s ease-in-out infinite 2s; opacity: 0.6; }
        .trail-4 { top: 80%; width: 50%; background: linear-gradient(90deg, transparent, var(--og-1)); animation: trailSweep4 8s ease-in-out infinite 0.5s; opacity: 0.4; }
        .trail-5 { top: 50%; width: 35%; background: linear-gradient(90deg, transparent, var(--og-2)); animation: trailSweep5 10s ease-in-out infinite 3s; opacity: 0.3; }

        @keyframes trailSweep1 { 0% { left: -50%; opacity: 0; } 15% { opacity: 0.7; } 85% { opacity: 0.7; } 100% { left: 110%; opacity: 0; } }
        @keyframes trailSweep2 { 0% { left: -60%; opacity: 0; } 10% { opacity: 0.5; } 90% { opacity: 0.5; } 100% { left: 110%; opacity: 0; } }
        @keyframes trailSweep3 { 0% { left: -45%; opacity: 0; } 20% { opacity: 0.6; } 80% { opacity: 0.6; } 100% { left: 110%; opacity: 0; } }
        @keyframes trailSweep4 { 0% { left: -55%; opacity: 0; } 12% { opacity: 0.4; } 88% { opacity: 0.4; } 100% { left: 110%; opacity: 0; } }
        @keyframes trailSweep5 { 0% { left: -40%; opacity: 0; } 18% { opacity: 0.3; } 82% { opacity: 0.3; } 100% { left: 110%; opacity: 0; } }

        /* Curved light trails via SVG */
        .curved-trails { position: absolute; inset: 0; z-index: 2; overflow: hidden; }
        .curved-trails svg { position: absolute; width: 100%; height: 100%; }
        .curved-trail-path { fill: none; stroke: var(--og-1); stroke-width: 1.5; stroke-linecap: round; filter: drop-shadow(0 0 6px rgba(0, 230, 138, 0.4)); }
        .curved-trail-1 { stroke-dasharray: 200 800; animation: curvedFlow1 8s linear infinite; opacity: 0.5; }
        .curved-trail-2 { stroke-dasharray: 150 700; stroke: var(--og-2); animation: curvedFlow2 11s linear infinite 2s; opacity: 0.35; }
        .curved-trail-3 { stroke-dasharray: 180 900; stroke: var(--og-3); animation: curvedFlow3 9s linear infinite 4s; opacity: 0.4; }
        @keyframes curvedFlow1 { 0% { stroke-dashoffset: 1000; } 100% { stroke-dashoffset: -1000; } }
        @keyframes curvedFlow2 { 0% { stroke-dashoffset: 850; } 100% { stroke-dashoffset: -850; } }
        @keyframes curvedFlow3 { 0% { stroke-dashoffset: 1080; } 100% { stroke-dashoffset: -1080; } }

        /* Floating Geometric Shapes */
        .floating-shapes { position: absolute; inset: 0; z-index: 3; pointer-events: none; }
        .geo-shape { position: absolute; opacity: 0.08; }
        .hexagon { width: 80px; height: 92px; animation: floatRotate1 25s ease-in-out infinite; }
        .hexagon-2 { width: 50px; height: 58px; animation: floatRotate2 30s ease-in-out infinite 5s; }
        .triangle { width: 60px; height: 52px; animation: floatTranslate 20s ease-in-out infinite 3s; }
        .diamond { width: 45px; height: 45px; animation: floatRotate3 22s ease-in-out infinite 7s; }
        .hexagon svg, .hexagon-2 svg, .triangle svg, .diamond svg { width: 100%; height: 100%; }
        @keyframes floatRotate1 { 0% { transform: translate(0,0) rotate(0deg); } 25% { transform: translate(30px,-20px) rotate(90deg); } 50% { transform: translate(-10px,20px) rotate(180deg); } 75% { transform: translate(-30px,-10px) rotate(270deg); } 100% { transform: translate(0,0) rotate(360deg); } }
        @keyframes floatRotate2 { 0% { transform: translate(0,0) rotate(0deg); } 33% { transform: translate(-20px,15px) rotate(120deg); } 66% { transform: translate(25px,-15px) rotate(240deg); } 100% { transform: translate(0,0) rotate(360deg); } }
        @keyframes floatTranslate { 0% { transform: translate(0,0) rotate(0deg); } 50% { transform: translate(20px,-25px) rotate(15deg); } 100% { transform: translate(0,0) rotate(0deg); } }
        @keyframes floatRotate3 { 0% { transform: translate(0,0) rotate(45deg); } 50% { transform: translate(-15px,20px) rotate(225deg); } 100% { transform: translate(0,0) rotate(405deg); } }

        /* Particle dots */
        .particle-field { position: absolute; inset: 0; z-index: 2; overflow: hidden; }
        .particle { position: absolute; width: 2px; height: 2px; border-radius: 50%; background: var(--og-1); }
        .p1 { top: 15%; left: 20%; animation: particleFloat 12s ease-in-out infinite; opacity: 0.3; }
        .p2 { top: 35%; left: 70%; animation: particleFloat 15s ease-in-out infinite 2s; opacity: 0.2; }
        .p3 { top: 55%; left: 40%; animation: particleFloat 10s ease-in-out infinite 4s; opacity: 0.4; }
        .p4 { top: 75%; left: 80%; animation: particleFloat 13s ease-in-out infinite 1s; opacity: 0.15; }
        .p5 { top: 25%; left: 55%; animation: particleFloat 11s ease-in-out infinite 3s; opacity: 0.25; width: 3px; height: 3px; }
        .p6 { top: 85%; left: 30%; animation: particleFloat 14s ease-in-out infinite 5s; opacity: 0.2; }
        .p7 { top: 45%; left: 15%; animation: particleFloat 16s ease-in-out infinite 2.5s; opacity: 0.35; width: 1.5px; height: 1.5px; }
        .p8 { top: 65%; left: 60%; animation: particleFloat 9s ease-in-out infinite 6s; opacity: 0.2; width: 3px; height: 3px; }
        @keyframes particleFloat { 0%, 100% { transform: translate(0,0); } 25% { transform: translate(15px,-20px); } 50% { transform: translate(-10px,10px); } 75% { transform: translate(20px,15px); } }

        /* Glow orbs */
        .glow-orb { position: absolute; border-radius: 50%; z-index: 2; pointer-events: none; }
        .glow-orb-1 { width: 300px; height: 300px; top: 10%; right: -50px; background: radial-gradient(circle, rgba(0,230,138,0.06) 0%, transparent 70%); animation: orbFloat 10s ease-in-out infinite; }
        .glow-orb-2 { width: 200px; height: 200px; bottom: 20%; left: 5%; background: radial-gradient(circle, rgba(0,204,122,0.04) 0%, transparent 70%); animation: orbFloat 12s ease-in-out infinite 3s; }
        @keyframes orbFloat { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(20px,-15px); } }

        /* Product Branding */
        .visual-content { position: relative; z-index: 10; text-align: center; padding: 0 40px; display: flex; flex-direction: column; align-items: center; }
        .brand-logo { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
        .brand-logo .logo-icon { width: 48px; height: 48px; margin-right: 14px; filter: drop-shadow(0 0 12px rgba(0,230,138,0.3)); }
        .brand-name { font-size: 52px; font-weight: 800; color: #ffffff; letter-spacing: -1.5px; line-height: 1; text-shadow: 0 0 40px rgba(0,230,138,0.25), 0 0 80px rgba(0,230,138,0.1); position: relative; }
        .brand-name .accent { background: linear-gradient(135deg, var(--og-1), var(--og-3)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .brand-tagline { font-size: 18px; color: rgba(255,255,255,0.55); margin-top: 14px; letter-spacing: 6px; font-weight: 300; }
        .brand-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 20px; padding: 6px 18px; background: rgba(0,230,138,0.08); border: 1px solid rgba(0,230,138,0.2); border-radius: 20px; color: var(--og-1); font-size: 12px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
        .brand-badge .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--og-1); box-shadow: 0 0 6px var(--og-1); animation: dotPulse 2s ease-in-out infinite; }
        @keyframes dotPulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

        /* Feature Cards */
        .feature-cards { position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; gap: 16px; padding: 0 30px; }
        .feature-card { display: flex; align-items: flex-start; gap: 12px; padding: 18px 20px; background: rgba(255,255,255,0.03); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(0,230,138,0.1); border-radius: 14px; width: 210px; transition: all 0.3s ease; }
        .feature-card:hover { background: rgba(255,255,255,0.06); border-color: rgba(0,230,138,0.25); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,230,138,0.08); }
        .feature-card .fc-icon { font-size: 24px; flex-shrink: 0; margin-top: 2px; }
        .feature-card .fc-text { display: flex; flex-direction: column; gap: 3px; }
        .feature-card .fc-title { font-size: 14px; font-weight: 600; color: #ffffff; }
        .feature-card .fc-desc { font-size: 12px; color: rgba(255,255,255,0.35); line-height: 1.5; }

        /* ===== RIGHT SIDE - Login Form (40%) ===== */
        .login-form-side {
            position: relative;
            width: 40%;
            height: 100%;
            background: linear-gradient(180deg, #0f1538 0%, #0c1230 50%, #0a0e27 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-form-side::before {
            content: '';
            position: absolute;
            top: 30%; left: 50%; transform: translateX(-50%);
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,230,138,0.04) 0%, transparent 70%);
            border-radius: 50%; z-index: 0;
        }

        .login-form-side::after {
            content: '';
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,230,138,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,230,138,0.02) 1px, transparent 1px);
            background-size: 40px 40px; z-index: 0;
        }

        /* Glass Card - Override old .login-card styles */
        .login-page .login-card {
            position: relative;
            z-index: 5;
            width: 380px;
            max-width: 90%;
            padding: 40px 36px;
            background: rgba(255,255,255,0.03) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(0,230,138,0.15) !important;
            border-radius: 20px !important;
            box-shadow: 0 0 40px rgba(0,230,138,0.08), 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.04) !important;
            animation: cardSlideIn 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
            opacity: 0;
            transform: translateX(40px);
        }

        @keyframes cardSlideIn { to { opacity: 1; transform: translateX(0); } }

        .login-card .card-deco-line {
            position: absolute; top: 0; left: 30px; right: 30px; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,230,138,0.3), transparent);
        }

        .login-card .welcome-heading { font-size: 26px; font-weight: 700; color: #ffffff; margin-bottom: 4px; letter-spacing: -0.5px; }
        .login-card .welcome-underline { width: 40px; height: 3px; background: linear-gradient(90deg, var(--og-1), var(--og-2)); border-radius: 2px; margin-bottom: 24px; box-shadow: 0 0 10px rgba(0,230,138,0.3); }

        /* Tab Bar - Override */
        .login-page .login-card .tab-bar {
            display: flex; margin-bottom: 28px;
            background: rgba(255,255,255,0.03); border-radius: 10px; padding: 3px;
            border: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05) !important;
        }

        .login-page .login-card .tab {
            flex: 1; text-align: center; padding: 10px 0; cursor: pointer;
            color: rgba(255,255,255,0.35); font-size: 14px; font-weight: 500;
            border-radius: 8px; transition: all 0.3s ease;
            border: 1px solid transparent; border-bottom: none !important;
            user-select: none;
        }

        .login-page .login-card .tab.active {
            color: #ffffff !important; background: rgba(0,230,138,0.1);
            border: 1px solid rgba(0,230,138,0.2) !important; border-bottom: none !important;
            box-shadow: 0 0 12px rgba(0,230,138,0.06);
        }

        .login-page .login-card .tab:not(.active):hover { color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.03); }

        /* Form - Override */
        .login-page .login-card .form-group { margin-bottom: 18px; }
        .login-page .login-card .form-group label { display: block; margin-bottom: 8px; font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 500; letter-spacing: 0.3px; }

        .login-page .login-card .form-group input {
            width: 100%; padding: 13px 16px;
            background: rgba(255,255,255,0.04) !important;
            border: 1px solid rgba(255,255,255,0.08) !important;
            border-radius: 10px; color: #ffffff !important;
            font-size: 14px; outline: none; transition: all 0.3s ease; font-family: inherit;
        }

        .login-page .login-card .form-group input::placeholder { color: rgba(255,255,255,0.35); }

        .login-page .login-card .form-group input:focus {
            border-color: rgba(0,230,138,0.5) !important;
            background: rgba(0,230,138,0.03) !important;
            box-shadow: 0 0 0 3px rgba(0,230,138,0.08), 0 0 20px rgba(0,230,138,0.06);
        }

        /* Login button - Override */
        .login-page .login-card .btn-primary,
        .login-page .login-card .btn-submit {
            width: 100%; padding: 13px; border: none; border-radius: 10px;
            font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.3s ease;
            background: linear-gradient(135deg, var(--og-1), var(--og-2)) !important;
            color: #0a0e27 !important; letter-spacing: 1px;
            position: relative; overflow: hidden; margin-top: 4px;
        }

        .login-page .login-card .btn-primary:hover,
        .login-page .login-card .btn-submit:hover {
            box-shadow: 0 0 20px rgba(0,230,138,0.3), 0 0 40px rgba(0,230,138,0.15) !important;
            transform: translateY(-1px);
            background: linear-gradient(135deg, var(--og-3), var(--og-1)) !important;
        }

        .login-page .login-card .btn-primary:active,
        .login-page .login-card .btn-submit:active { transform: translateY(0) scale(0.98); }

        /* Message Box - Override */
        .login-page .login-card .msg-box { text-align: center; margin-top: 14px; font-size: 13px; min-height: 20px; transition: all 0.3s ease; }
        .login-page .login-card .msg-box.error { color: #ff6b6b !important; }
        .login-page .login-card .msg-box.success { color: #00e68a !important; }

        /* Hide subtitle on new login page (replaced by welcome-heading) */
        .login-page .login-card .subtitle { display: none; }
        .login-page .login-card h1:not(.welcome-heading) { display: none; }

        /* Responsive */
        @media (max-width: 768px) {
            .login-visual { display: none; }
            .login-form-side { width: 100%; }
            .login-page .login-card { padding: 32px 24px; }
        }

        @media (max-width: 480px) {
            .login-page .login-card { padding: 28px 20px; border-radius: 16px !important; }
            .login-card .welcome-heading { font-size: 22px; }
        }

        /* Selection */
        .login-page ::selection { background: rgba(0,230,138,0.3); color: #ffffff; }
    </style>
</head>

<!-- Sidebar Overlay (Mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebarMobile()"></div>

<!-- Toast Notification -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<!-- Login Page -->
<div class="login-page" id="loginPage" role="main" aria-label="登录页面">

    <!-- LEFT SIDE - Visual Showcase -->
    <div class="login-visual">
        <!-- Light Trails -->
        <div class="light-trails">
            <div class="light-trail trail-1"></div>
            <div class="light-trail trail-2"></div>
            <div class="light-trail trail-3"></div>
            <div class="light-trail trail-4"></div>
            <div class="light-trail trail-5"></div>
        </div>

        <!-- Curved Light Trails (SVG) -->
        <div class="curved-trails">
            <svg viewBox="0 0 800 600" preserveAspectRatio="none">
                <path class="curved-trail-path curved-trail-1" d="M -100,150 C 100,100 200,250 400,180 S 600,120 900,200" />
                <path class="curved-trail-path curved-trail-2" d="M -100,300 C 150,350 250,200 450,280 S 650,350 900,260" />
                <path class="curved-trail-path curved-trail-3" d="M -100,450 C 200,400 300,500 500,430 S 700,380 900,460" />
            </svg>
        </div>

        <!-- Floating Geometric Shapes -->
        <div class="floating-shapes">
            <div class="geo-shape hexagon" style="top: 12%; left: 15%;">
                <svg viewBox="0 0 100 115" fill="none"><polygon points="50,2 95,28 95,87 50,113 5,87 5,28" stroke="#00e68a" stroke-width="1.5" fill="none"/></svg>
            </div>
            <div class="geo-shape hexagon-2" style="top: 70%; right: 18%;">
                <svg viewBox="0 0 100 115" fill="none"><polygon points="50,2 95,28 95,87 50,113 5,87 5,28" stroke="#00cc7a" stroke-width="1.5" fill="none"/></svg>
            </div>
            <div class="geo-shape triangle" style="top: 40%; left: 70%;">
                <svg viewBox="0 0 100 87" fill="none"><polygon points="50,2 98,85 2,85" stroke="#00e68a" stroke-width="1.5" fill="none"/></svg>
            </div>
            <div class="geo-shape diamond" style="top: 22%; right: 30%;">
                <svg viewBox="0 0 100 100" fill="none"><polygon points="50,2 98,50 50,98 2,50" stroke="#00ff99" stroke-width="1.5" fill="none"/></svg>
            </div>
        </div>

        <!-- Particles -->
        <div class="particle-field">
            <div class="particle p1"></div><div class="particle p2"></div><div class="particle p3"></div><div class="particle p4"></div>
            <div class="particle p5"></div><div class="particle p6"></div><div class="particle p7"></div><div class="particle p8"></div>
        </div>

        <!-- Glow Orbs -->
        <div class="glow-orb glow-orb-1"></div>
        <div class="glow-orb glow-orb-2"></div>

        <!-- Branding Content -->
        <div class="visual-content">
            <div class="brand-logo">
                <svg class="logo-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="44" height="44" rx="12" fill="rgba(0,230,138,0.1)" stroke="#00e68a" stroke-width="1.5"/>
                    <path d="M14 16h20M14 24h14M14 32h18" stroke="#00e68a" stroke-width="2.5" stroke-linecap="round"/>
                    <circle cx="36" cy="32" r="5" fill="rgba(0,230,138,0.2)" stroke="#00e68a" stroke-width="1.5"/>
                    <path d="M34 32l2 2 4-4" stroke="#00e68a" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="brand-name">Doc<span class="accent">Agent</span></span>
            </div>
            <div class="brand-tagline">智能驱动 · 合规有序</div>
            <div class="brand-badge">
                <span class="badge-dot"></span>
                Enterprise AI Agent Platform
            </div>
        </div>

        <!-- Feature Cards -->
        <div class="feature-cards">
            <div class="feature-card">
                <span class="fc-icon">🛡️</span>
                <div class="fc-text">
                    <span class="fc-title">安全可靠</span>
                    <span class="fc-desc">企业级数据安全保障</span>
                </div>
            </div>
            <div class="feature-card">
                <span class="fc-icon">⚡</span>
                <div class="fc-text">
                    <span class="fc-title">智能敏捷</span>
                    <span class="fc-desc">AI驱动的自主决策引擎</span>
                </div>
            </div>
            <div class="feature-card">
                <span class="fc-icon">📋</span>
                <div class="fc-text">
                    <span class="fc-title">合规有序</span>
                    <span class="fc-desc">严谨的流程与权限管理</span>
                </div>
            </div>
        </div>
    </div>

    <!-- RIGHT SIDE - Login Form -->
    <div class="login-form-side">
        <div class="login-card">
            <div class="card-deco-line"></div>

            <h1 class="welcome-heading">欢迎回来</h1>
            <div class="welcome-underline"></div>

            <div class="tab-bar" role="tablist">
                <div class="tab active" onclick="switchTab('login')" role="tab" aria-selected="true" tabindex="0">登录</div>
                <div class="tab" onclick="switchTab('register')" role="tab" aria-selected="false" tabindex="0">注册</div>
            </div>

            <div id="loginForm" role="tabpanel">
                <div class="form-group">
                    <label for="loginUser">用户名</label>
                    <input type="text" id="loginUser" placeholder="输入用户名" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="loginPass">密码</label>
                    <input type="password" id="loginPass" placeholder="输入密码" onkeydown="if(event.key==='Enter')doLogin()" autocomplete="current-password">
                </div>
                <button class="btn btn-primary" onclick="doLogin()" aria-label="登录">登 录</button>
                <div class="msg-box" id="loginMsg" role="status" aria-live="polite"></div>
            </div>

            <div id="registerForm" style="display:none" role="tabpanel">
                <div class="form-group">
                    <label for="regUser">用户名</label>
                    <input type="text" id="regUser" placeholder="至少2个字符" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="regPass">密码</label>
                    <input type="password" id="regPass" placeholder="至少4个字符" onkeydown="if(event.key==='Enter')doRegister()" autocomplete="new-password">
                </div>
                <button class="btn btn-primary" onclick="doRegister()" aria-label="注册">注 册</button>
                <div class="msg-box" id="regMsg" role="status" aria-live="polite"></div>
            </div>
        </div>
    </div>

</div>

<!-- Chat Page -->
<div class="chat-page" id="chatPage" role="main">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar" role="navigation" aria-label="对话列表">
        <div class="sidebar-header">
            <div class="mode-switcher-box" id="modeSwitcherBox" role="radiogroup" aria-label="模式切换">
                <button class="mode-btn" id="modeChat" onclick="switchMode('chat')" role="radio" aria-checked="false" aria-label="Chat模式">
                    <span class="mode-icon">💬</span>
                    <span class="mode-label">Chat</span>
                </button>
                <button class="mode-btn active" id="modeAgent" onclick="switchMode('agent')" role="radio" aria-checked="true" aria-label="Agent模式">
                    <span class="mode-icon">🤖</span>
                    <span class="mode-label">Agent</span>
                </button>
            </div>
            <button class="new-chat-btn" onclick="createNewChat()" aria-label="新建对话">
                <span class="plus-icon">+</span>
                <span>新建对话</span>
            </button>
            <div class="chat-search" id="chatSearch">
                <span class="search-icon">🔍</span>
                <input type="text" id="chatSearchInput" placeholder="搜索对话..." oninput="filterChats(this.value)" aria-label="搜索对话">
            </div>
        </div>
        <div class="chat-list" id="chatList" role="list" aria-label="会话列表">
            <!-- dynamic render -->
        </div>
        <div class="sidebar-footer">
            <div class="user-avatar" id="sidebarAvatar" aria-hidden="true">U</div>
            <div class="user-name" id="sidebarUsername">用户</div>
            <button class="logout-btn" onclick="doLogout()" title="退出登录" aria-label="退出登录">⏻</button>
        </div>
    </aside>

    <!-- Chat Main -->
    <div class="chat-main">
        <header class="chat-header">
            <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="切换侧边栏" aria-label="切换侧边栏">☰</button>
            <h1 id="chatTitle">DocAgent</h1>
            <div class="header-actions">
                <button class="header-btn" onclick="toggleTheme()" title="切换暗色/亮色模式" id="themeBtn" aria-label="切换主题">🌙</button>
                <select class="model-select" id="modelSelect" onchange="switchModel()" title="切换模型" aria-label="选择模型"></select>
                <button class="header-btn" onclick="showDocs()" aria-label="知识库管理">知识库</button>
                <!-- Export dropdown -->
                <div class="export-wrapper">
                    <button class="header-btn" onclick="toggleExportDropdown()" title="导出对话" aria-label="导出对话" aria-haspopup="true">📥 导出</button>
                    <div class="export-dropdown" id="exportDropdown" role="menu">
                        <button onclick="exportChat('md')" role="menuitem" aria-label="导出为Markdown">
                            📝 Markdown
                        </button>
                        <button onclick="exportChat('pdf')" role="menuitem" aria-label="导出为PDF">
                            📄 PDF
                        </button>
                    </div>
                </div>

                <button class="header-btn danger" onclick="clearCurrentChat()" aria-label="清除当前对话">清除当前</button>
            </div>
        </header>
        <div class="chat-content centered" id="chatContent">
            <!-- Welcome (centered mode) -->
            <div class="welcome-center" id="welcomeCenter">
                <h2>DocAgent</h2>
                <p>智能驱动，高效协同。随时为您解答疑问、处理事务，让工作更简单。</p>
                <div class="quick-actions">
                    <span class="quick-action" onclick="sendQuick('公司年假制度是什么？')" role="button" tabindex="0">年假制度</span>
                    <span class="quick-action" onclick="sendQuick('列出所有员工信息')" role="button" tabindex="0">员工信息</span>
                    <span class="quick-action" onclick="sendQuick('知识库有哪些文档？')" role="button" tabindex="0">知识库文档</span>
                    <span class="quick-action" onclick="sendQuick('报销流程是什么？')" role="button" tabindex="0">报销流程</span>
                </div>
            </div>
            <!-- Chat Messages -->
            <div class="chat-messages" id="chatMessages" role="log" aria-label="对话消息" aria-live="polite"></div>
            <!-- Scroll to bottom -->
            <button class="scroll-bottom-btn" id="scrollBottomBtn" onclick="scrollToBottom()" title="滚动到底部" aria-label="滚动到底部">↓</button>
            <div class="typing-indicator" id="typingIndicator" aria-hidden="true">
                <div style="display:flex;align-items:center;gap:12px;">
                    <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
                </div>
            </div>
            <div class="chat-input-area">
                <div class="input-container">
                    <div class="file-bar" id="fileBar">
                        <span id="fileIcon">📎</span>
                        <span class="file-name" id="fileName"></span>
                        <span class="remove-file" onclick="removeFile()" role="button" aria-label="移除文件">✕</span>
                    </div>
                    <div class="input-top">
                        <textarea id="msgInput" rows="1" placeholder="输入问题，或粘贴/拖拽文件..." onkeydown="handleKey(event)" oninput="autoResize(this)" aria-label="输入消息"></textarea>
                        <div class="send-btn-wrap">
                            <button class="icon-btn send" id="sendBtn" onclick="sendMessage()" title="发送" aria-label="发送消息">➤</button>
                            <button class="icon-btn stop" id="stopBtn" onclick="stopGeneration()" title="停止生成" style="display:none;" aria-label="停止生成">■</button>
                        </div>
                    </div>
                    <div class="input-toolbar">
                        <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()" title="上传文件或图片" aria-label="上传文件">📎</button>
                        <button class="web-search-toggle" id="webSearchToggle" onclick="toggleWebSearch()" title="开启/关闭联网搜索" aria-label="联网搜索" aria-pressed="false">
                            <span class="toggle-icon">🌐</span>
                            <span class="toggle-label">联网搜索</span>
                        </button>
                        <button class="deep-think-toggle" id="deepThinkToggle" onclick="toggleDeepThink()" title="开启/关闭深度思考" aria-label="深度思考" aria-pressed="false">
                            <span class="toggle-icon">🧠</span>
                            <span class="toggle-label">深度思考</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.png,.jpg,.jpeg,.gif,.bmp,.webp,.csv,.xlsx,.xls,.doc,.ppt,.pptx,.md,.json,.py,.js,.html,.css" onchange="onFileSelected(event)" aria-hidden="true">
    </div>
</div>

<!-- Knowledge Base Modal -->
<div class="modal-overlay" id="docsModal" role="dialog" aria-label="知识库管理" aria-modal="true">
    <div class="modal">
        <h3>知识库管理</h3>
        <div class="upload-section" id="uploadZone" onclick="document.getElementById('kbFileInput').click()" role="button" aria-label="上传文档">
            <div class="upload-icon">📤</div>
            <div class="upload-text">点击或拖拽文件到此处 <strong>上传到知识库</strong></div>
            <div class="upload-hint">支持 PDF、TXT、DOCX 格式</div>
        </div>
        <input type="file" id="kbFileInput" accept=".pdf,.txt,.docx" onchange="onKbFileSelected(event)" multiple aria-hidden="true">
        <div class="upload-progress" id="uploadProgress" role="progressbar">
            <div class="progress-file" id="progressFileName">正在上传...</div>
            <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBarFill"></div></div>
            <div class="progress-status" id="progressStatus">上传中...</div>
        </div>
        <div class="divider">已索引文档</div>
        <div class="doc-list" id="docList" role="list"><div class="doc-empty">加载中...</div></div>
        <button class="btn btn-primary close-btn" onclick="closeDocs()" aria-label="关闭">关闭</button>
    </div>
</div>

<!-- Rename Overlay -->
<div class="rename-overlay" id="renameOverlay" role="dialog" aria-label="重命名对话" aria-modal="true">
    <div class="rename-card">
        <h3>重命名对话</h3>
        <input type="text" id="renameInput" placeholder="输入新名称" onkeydown="if(event.key==='Enter')confirmRename()" aria-label="新名称">
        <div class="rename-btns">
            <button class="cancel-btn" onclick="cancelRename()" aria-label="取消">取消</button>
            <button class="confirm-btn" onclick="confirmRename()" aria-label="确认重命名">确认</button>
        </div>
    </div>
</div>

<!-- App Script -->
<script src="/static/js/app.js"></script>
</body>
</html>
